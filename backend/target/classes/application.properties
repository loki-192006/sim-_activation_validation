# ============================================================
#  SIM Activation Portal - Application Configuration
# ============================================================

# Server
server.port=8080
spring.application.name=sim-activation-portal

# ─── Database ───────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/sim_portal?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# ─── Logging ────────────────────────────────────────────────
logging.level.com.simportal=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ─── Swagger / OpenAPI ──────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.info.title=SIM Activation Portal API
springdoc.info.description=REST APIs for SIM activation workflow
springdoc.info.version=1.0.0
